[primary]
hana-primary ansible_host=YOUR_PRIMARY_PUBLIC_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/YOUR_KEY.pem

[secondary]
hana-secondary ansible_host=YOUR_SECONDARY_PUBLIC_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/YOUR_KEY.pem

[hana:children]
primary
secondary

[hana:vars]
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ServerAliveInterval=30 -o ServerAliveCountMax=20'
primary_private_hostname=ip-10-0-1-61
